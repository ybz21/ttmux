name: Frontend i18n audit

on:
  push:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  i18n:
    name: i18n audit and frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run i18n audit
        run: npm run i18n:check

      - name: Build frontend
        run: npm run build

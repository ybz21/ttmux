    <path d="M12 52H30" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" opacity=".65"/>
    <path d="M34 52H41" stroke="#8b5cf6" stroke-width="2.2" stroke-linecap="round" opacity=".75"/>

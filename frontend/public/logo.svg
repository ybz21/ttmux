<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 64" width="248" height="64" role="img" aria-label="Roam">
  <defs>
    <linearGradient id="roam-bg" x1="8" y1="5" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".48" stop-color="#0a0f1d"/>
      <stop offset="1" stop-color="#020409"/>
    </linearGradient>
    <linearGradient id="roam-ring" x1="7" y1="10" x2="57" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ee7f9"/>
      <stop offset=".42" stop-color="#22d3ee"/>
      <stop offset=".72" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="roam-core" x1="19" y1="15" x2="47" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f2439"/>
      <stop offset=".5" stop-color="#061526"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="roam-r" x1="20" y1="17" x2="45" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0faff"/>
      <stop offset=".45" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="roam-word" x1="78" y1="14" x2="176" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0faff"/>
      <stop offset=".3" stop-color="#38bdf8"/>
      <stop offset=".68" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="roam-glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="roam-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <g>
    <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#roam-bg)"/>
    <rect x="3" y="3" width="58" height="58" rx="15" fill="none" stroke="#172033" stroke-width="1.4"/>
    <g filter="url(#roam-glow)" opacity=".96">
      <path d="M10 36C10 20 22 9 38 11C50 13 57 22 57 34" fill="none" stroke="url(#roam-ring)" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M55 35L59 30L60 37" fill="none" stroke="#6ee7f9" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M54 46C46 55 31 57 20 50C12 45 8 38 8 29" fill="none" stroke="url(#roam-ring)" stroke-width="1.7" stroke-linecap="round" opacity=".6"/>
    </g>
    <g opacity=".95">
      <path d="M17 18L25 25" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M47 18L39 25" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M48 47L40 40" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="17" cy="18" r="3.2" fill="#03111d" stroke="#22d3ee" stroke-width="1.8"/>
      <circle cx="47" cy="18" r="3.2" fill="#03111d" stroke="#8b5cf6" stroke-width="1.8"/>
      <circle cx="48" cy="47" r="3.2" fill="#03111d" stroke="#f472b6" stroke-width="1.8"/>
    </g>
    <g filter="url(#roam-shadow)">
      <rect x="15" y="18" width="34" height="31" rx="9" fill="url(#roam-core)" stroke="url(#roam-ring)" stroke-width="1.8"/>
      <path d="M23 27H35C40 27 43 30 43 34C43 38 40 41 35 41H23" fill="none" stroke="url(#roam-r)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M23 27V46" fill="none" stroke="url(#roam-r)" stroke-width="4.2" stroke-linecap="round"/>
      <path d="M34 41L43 49" fill="none" stroke="#60a5fa" stroke-width="4.2" stroke-linecap="round"/>
      <path d="M25 34H34" stroke="#dffbff" stroke-width="2.4" stroke-linecap="round" opacity=".9"/>
      <circle cx="35" cy="34" r="2.3" fill="#e0faff"/>

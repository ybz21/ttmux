<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ttmux logo">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b4252"/>
      <stop offset=".5" stop-color="#222a35"/>
      <stop offset="1" stop-color="#11151b"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#388bfd"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 外框：金属暗色磨砂 tile -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="15" fill="url(#edge)"/>
  <rect x="3" y="3" width="58" height="58" rx="13.5" fill="url(#tile)"/>

  <!-- 四个 tmux 窗格 = 多个终端并行 -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 左上：青 -->
    <rect x="12" y="12" width="18" height="18" rx="4" fill="#0d1117" stroke="#233042"/>
    <path d="M16.5 18.5 L20 21.5 L16.5 24.5" stroke="#39d0d8" stroke-width="2.2"/>
    <line x1="22.5" y1="24.5" x2="26" y2="24.5" stroke="#39d0d8" stroke-width="2.2" opacity=".55"/>

    <!-- 右上：绿 -->
    <rect x="34" y="12" width="18" height="18" rx="4" fill="#0d1117" stroke="#233042"/>
    <path d="M38.5 18.5 L42 21.5 L38.5 24.5" stroke="#3fb950" stroke-width="2.2"/>
    <line x1="44.5" y1="24.5" x2="48" y2="24.5" stroke="#3fb950" stroke-width="2.2" opacity=".55"/>

    <!-- 左下：紫 -->
    <rect x="12" y="34" width="18" height="18" rx="4" fill="#0d1117" stroke="#233042"/>
    <path d="M16.5 40.5 L20 43.5 L16.5 46.5" stroke="#bc8cff" stroke-width="2.2"/>
    <line x1="22.5" y1="46.5" x2="26" y2="46.5" stroke="#bc8cff" stroke-width="2.2" opacity=".55"/>

    <!-- 右下：活动窗格（正在干活，蓝光高亮 + 光标块） -->
    <rect x="34" y="34" width="18" height="18" rx="4" fill="#0b1f3a" stroke="url(#active)" stroke-width="1.6" filter="url(#glow)"/>
    <path d="M38.5 40.5 L42 43.5 L38.5 46.5" stroke="#58a6ff" stroke-width="2.2" filter="url(#glow)"/>
    <rect x="44" y="41.4" width="4.6" height="4.6" rx="1" fill="#58a6ff" stroke="none" filter="url(#glow)"/>
  </g>

  <!-- 中心编排节点：把四个终端连成一体（一起干活） -->
  <g>
    <line x1="32" y1="21" x2="32" y2="43" stroke="#58a6ff" stroke-width="1.1" opacity=".35"/>
    <line x1="21" y1="32" x2="43" y2="32" stroke="#58a6ff" stroke-width="1.1" opacity=".35"/>
    <circle cx="32" cy="32" r="3.4" fill="#0d1117" stroke="url(#active)" stroke-width="1.6"/>
    <circle cx="32" cy="32" r="1.3" fill="#58a6ff"/>
  </g>
</svg>

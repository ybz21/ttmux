<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <!-- 添加到主屏幕后全屏运行（iOS/Android 平板等价 F11，无浏览器栏） -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Roam" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
  <link rel="apple-touch-icon" href="/logo-mark-512.png" />
  <title>Roam · Code anywhere, anytime</title>
  <style>
    html,body,#root{height:100%;margin:0;background:#0d1117}
    /* 深色滚动条（默认白色滚动条在黑底上太突兀） */
    *{scrollbar-width:thin;scrollbar-color:#30363d transparent}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#30363d;border-radius:6px;border:2px solid transparent;background-clip:content-box}
    ::-webkit-scrollbar-thumb:hover{background:#484f58;border:2px solid transparent;background-clip:content-box}
    ::-webkit-scrollbar-corner{background:transparent}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
